<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- Qubit / Bloch-sphere motif -->
  <g transform="translate(300,300)" opacity="0.95">
    <ellipse cx="0" cy="0" rx="150" ry="150" fill="none" stroke="url(#orbit)" stroke-width="2" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="150" ry="55" fill="none" stroke="url(#orbit)" stroke-width="2" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="55" ry="150" fill="none" stroke="url(#orbit)" stroke-width="2" opacity="0.85"/>
    <line x1="0" y1="-150" x2="0" y2="150" stroke="url(#orbit)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#f8fafc"/>
    <circle cx="46" cy="-96" r="7" fill="#38bdf8"/>
    <circle cx="-70" cy="82" r="6" fill="#a5b4fc"/>
    <circle cx="98" cy="60" r="5" fill="#f8fafc" opacity="0.8"/>
  </g>

  <!-- Small classical-bit accent (0/1) to nod to "Classical AND Quantum" -->
  <g transform="translate(300,300)" font-family="Georgia, 'Times New Roman', serif" opacity="0.9">
    <text x="-190" y="-170" font-size="34" fill="#38bdf8" opacity="0.55">0</text>
    <text x="165" y="200" font-size="34" fill="#a5b4fc" opacity="0.55">1</text>
  </g>

  <!-- Title block -->
  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="300" y="540" font-size="17" letter-spacing="4" fill="#a5b4fc">A TEXTBOOK</text>

    <text x="300" y="600" font-size="40" font-weight="700" fill="#f8fafc">Introduction to</text>
    <text x="300" y="648" font-size="40" font-weight="700" fill="#f8fafc">Classical and</text>
    <text x="300" y="696" font-size="40" font-weight="700" fill="#f8fafc">Quantum Computing</text>

    <line x1="220" y1="726" x2="380" y2="726" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>

    <text x="300" y="756" font-size="20" fill="#c7d2fe">Thomas G. Wong</text>
  </g>

  <text x="300" y="60" font-family="Georgia, serif" font-size="13" letter-spacing="3" fill="#818cf8" text-anchor="middle" opacity="0.8">NATIONAL DIGITAL LIBRARY · AI READER</text>
</svg>